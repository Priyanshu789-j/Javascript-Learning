<!DOCTYPE html>
<html lang="en">

<head> //events bubbling means if we are in uk then india and asia means all willl show
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Bubbling</title>
  <style>
    .child {
      background-color: aliceblue;
      border: 2px solid green;
      padding: 34px;
      margin: 34px;
      cursor: pointer;
    }

    .childContainer {
      background-color: beige;
      padding: 14px;
      margin: 14px;

    }

    .container {
      background-color: aqua;
      padding: 14px;
      margin: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <section class="childContainer">
      <div class="child">
        i am child
      </div>

    </section>
  </div>
  <script>
    document.querySelector(".child").addEventListener("click", (e) => {
      e.stopPropagation() //stops the bubbling after child
      alert("child was clicked ")
    })

    document.querySelector(".childContainer").addEventListener("click", (e) => {
      e.stopPropagation()
      alert("childContainer was clicked ")
    })

    document.querySelector(".container").addEventListener("click", (e) => {
      e.stopPropagation()
      alert("container was clicked ")
    })

    function getRandomColor() {
      let val1 = Math.ceil(0 + Math.random() * 255);
      let val2 = Math.ceil(0 + Math.random() * 255);
      let val3 = Math.ceil(0 + Math.random() * 255);
      return `rgb(${val1},${val2},${val3})`
    }

    // let a = setInterval(() => { //it will change the colour interval in every 1000ms = 1sec 
    //   document.querySelector(".childContainer").style.background = getRandomColor()
    // }, 1000);
    // console.log(a)
    
    // by runing clearInterval in console it will clear the interval of 1 sec
    
    
    let a = setTimeout(() => { //it will change the colour interval in every 1000ms = 1sec 
      document.querySelector(".childContainer").style.background = getRandomColor()
    }, 5000);
    console.log(a)
    // it will change the colur in every 5 sec 

    // by runing clearTimeout in console it will clear the interval of 5 sec


  </script>
</body>

</html>
